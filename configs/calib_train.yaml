exp:
  name: calib_pmp_zju
  out_dir: /data00/wsx/code/calibnet/runs
  seed: 123
  device: cuda
  amp: true

data:
  dataset_class: "datasets.ZJU.ZJU4DRadarCam"
  dataset_kwargs:
    target_h: 288
    target_w: 864
    mode: train
    path: "/data00/wsx/data/ZJU-4DRadarCam"
    num_sample: 500
    mul_factor: 1.0
    num_mask: 1
    return_sparse_gt: true
    sparse_gt_dirname: "gt"
    sky_bias_ratio: 0.30

  num_workers: 4
  train_batch_size: 4
  val_batch_size: 8

train:
  epochs: 50
  lr: 2.0e-4
  weight_decay: 1.0e-4
  log_every: 500
  save_every: 1
  val_every: 1
  grad_clip_norm: 1.0

model:
  calib:
    num_scales: 5
    rgb_channels: [32, 64, 96, 128, 160]
    radar_channels: [16, 24, 32, 40, 48]
    radar_token_down_ratio: 2

    sa:
      window: 5
      heads: 4
      dim_head: 16
      dilation: 2

    ca:
      out_dim: 64

    refine:
      blocks: 2
      use_channel_attn: true
      se_reduction: 8

  pmp: {}

loss:
  lambda_calib: 1.0
  lambda_pmp: 1.0

  # Shared valid mask settings
  t_valid: 0.001
  depth_min: 0.0
  depth_max: 80.0
  use_sparse_gt_mask: true
  metrics_use_sparse_gt: true
  gt_outlier_kernel_size: -1
  gt_outlier_threshold: 1.5

  # PMP supervision
  pmp_ms_weights: [0.03, 0.06, 0.12, 0.25, 0.5, 1.0]
  pmp_sparse_weight: 1.0

  # Calib-only losses
  calib:
    w_sparse: 1.0
    w_consistency: 0.3
    w_energy: 0.05
    w_outside: 0.1
    use_sparse_gt_mask: true
    ms_weights: [1.0, 0.7, 0.5, 0.35, 0.25]
